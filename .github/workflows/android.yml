name: OzkanGMI APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v2'den v4'e güncellendi

      - name: Set up Python
        uses: actions/setup-python@v5 # v2'den v5'e güncellendi
        with:
          python-version: '3.9'

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: master
          command: buildozer android debug
          repository_display_name: OzkanGMI

      - name: Upload APK
        uses: actions/upload-artifact@v4 # İşte o hatayı veren yer burasıydı, v4 yaptık!
        with:
          name: OzkanGMI-Paketim
          path: bin/*.apk
          
