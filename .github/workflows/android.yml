name: Ozkan_Build_Final_v1

on:
  workflow_dispatch: # Manuel başlatmak için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # Önemli: Eğer spec dosyan yoksa init yap, varsa direkt devam et
          [ -f buildozer.spec ] || buildozer init
          # Hata almamak için log seviyesini yükseltiyoruz
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Ozkan_App_Package
          path: bin/*.apk
          
